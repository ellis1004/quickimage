</head>
<body>
  <div class="app-container">
    <header>
      <div class="logo-section">
        <h1><a href="index.html" style="text-decoration:none; color:inherit; background:var(--accent-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">QuickToolsLive</a></h1>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">🏠 首頁大廳</a>
        <a href="image-compressor.html" class="nav-link">🖼️ 圖片壓縮</a>

        <a href="focus-timer.html" class="nav-link">⏱️ 專注計時</a>
        <div class="dropdown">
          <a href="#" class="nav-link dropdown-toggle active">✨ 更多工具</a>
          <div class="dropdown-content">
            <a href="word-counter.html">✍️ 字數統計器</a>
            <a href="password-generator.html" class="active">🔒 密碼產生器</a>
            <a href="json-formatter.html">💻 JSON 格式化</a>

          </div>
        </div>
      </nav>
    </header>

    <div class="ad-banner">
      <span>廣告版位預留 (Responsive Banner Ad)</span>
    </div>

    <div class="main-grid">
      <div class="workspace">
        <div class="glass-card">
          <h2 style="margin-bottom: 1.5rem;">🔒 安全隨機密碼產生器</h2>
          
          <div class="glass-card" style="background:rgba(255,255,255,0.02); padding:1rem 1.5rem; display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; border-color:rgba(255,255,255,0.05);">
            <div id="password-display" style="font-family:monospace; font-size:1.4rem; letter-spacing:1px; word-break:break-all; color:var(--text-primary);">請點擊生成按鈕</div>
            <button class="btn btn-icon" id="btn-copy" title="複製密碼" style="background:var(--bg-tertiary); border:1px solid var(--border-color); width:40px; height:40px;">
              <svg viewBox="0 0 24 24" style="width:20px; height:20px; fill:var(--text-secondary);"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
          </div>

          <div style="margin-bottom: 1.5rem;">
            <div class="control-label">
              <span>密碼強度：<span id="strength-text" style="font-weight:700;">-</span></span>
            </div>
            <div class="strength-meter">
              <div id="strength-bar" class="strength-bar"></div>
            </div>
          </div>

          <div class="control-group" style="margin-bottom:1.5rem;">
            <div class="control-label">
              <span>密碼長度:</span>
              <span class="value" id="length-val">16</span>
            </div>
            <input type="range" id="password-length" min="6" max="64" value="16">
          </div>

          <div class="checkbox-grid" style="margin-bottom: 1.5rem;">
            <label class="checkbox-label">
              <input type="checkbox" id="opt-upper" checked> 包含大寫字母 (A-Z)
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="opt-lower" checked> 包含小寫字母 (a-z)
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="opt-nums" checked> 包含數字 (0-9)
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="opt-symbols" checked> 包含符號 (!@#$%^&*)
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="opt-exclude"> 排除易混淆字元 (o, 0, i, l, 1, I)
            </label>
          </div>

          <button class="btn btn-primary" id="btn-generate" style="width:100%;">⚡ 產生隨機安全密碼</button>
        </div>
      </div>

      <div class="ad-sidebar">
        <div class="ad-skyscraper">
          <span>廣告版位預留 (Skyscraper Ad)</span>
